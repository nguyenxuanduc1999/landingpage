name: Deploy Firebase Hosting Preview on PR

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    # Avoid running on forked PRs where repository secrets are unavailable.
    if: ${{ github.event.pull_request.head.repo.fork == false }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Deploy to Firebase Hosting preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_AI_PROJECT_BFDA4 }}"
          projectId: ai-project-bfda4
          channelId: pr-${{ github.event.number }}
          expires: 7d
